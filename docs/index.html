<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KaloriTrack Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f7e6; padding: 20px; }
    h1 { color: #33691E; margin-bottom: 6px; font-size: 22px; }
    .subtitle { color: #7a9a5a; font-size: 13px; margin-bottom: 20px; }
    .cards { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .card { background: #fff; border-radius: 12px; padding: 16px; flex: 1;
            border: 1.5px solid #C5E1A5; text-align: center; min-width: 120px; }
    .card-val { font-size: 26px; font-weight: bold; color: #4CAF50; }
    .card-label { font-size: 12px; color: #7a9a5a; margin-top: 4px; }
    .chart-card { background: #fff; border-radius: 12px; padding: 16px;
                  border: 1.5px solid #C5E1A5; margin-bottom: 20px; }
    .chart-title { font-size: 14px; font-weight: 600; color: #33691E; margin-bottom: 12px; }
    .bar-wrap { display: flex; align-items: flex-end; height: 160px; gap: 6px; }
    .bar-col { flex: 1; display: flex; flex-direction: column;
               align-items: center; height: 100%; justify-content: flex-end; }
    .bar { width: 100%; border-radius: 4px; min-height: 4px; transition: height 0.5s ease; }
    .bar-day { font-size: 11px; color: #8a9a6a; margin-top: 6px; }
    .bar-num { font-size: 9px; color: #666; margin-bottom: 4px; text-align: center; }
    .legend { display: flex; gap: 16px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    table { width: 100%; border-collapse: collapse; background: #fff;
            border-radius: 12px; overflow: hidden; border: 1.5px solid #C5E1A5; }
    th { background: #4CAF50; color: #fff; padding: 10px 14px; text-align: left; font-size: 13px; }
    td { padding: 10px 14px; border-bottom: 1px solid #f0f7e6; color: #555; font-size: 13px; }
    td:last-child { color: #4CAF50; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    #loading { color: #4CAF50; font-size: 15px; margin: 40px 0; text-align: center; }
    #error { color: #e53935; font-size: 14px; margin: 20px 0; padding: 12px;
             background: #fff; border-radius: 8px; border: 1px solid #ffcdd2; }
  </style>
</head>
<body>
  <h1>📊 KaloriTrack Dashboard</h1>
  <p class="subtitle">Statistik kalori 7 hari terakhir</p>

  <p id="loading">⏳ Memuat data...</p>
  <p id="error" style="display:none"></p>

  <div id="content" style="display:none">
    <div class="cards">
      <div class="card">
        <div class="card-val" id="rataRata">-</div>
        <div class="card-label">Rata-rata kkal/hari</div>
      </div>
      <div class="card">
        <div class="card-val" id="hariAktif">-</div>
        <div class="card-label">Hari aktif</div>
      </div>
      <div class="card">
        <div class="card-val" id="totalMinggu">-</div>
        <div class="card-label">Total minggu ini</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Kalori per Hari</div>
      <div class="bar-wrap" id="barChart"></div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#4CAF50"></div> Normal
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#CDDC39"></div> Tinggi (&gt;1800 kkal)
        </div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Hari</th>
          <th>Tanggal</th>
          <th>Kalori</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ⬇️ GANTI DENGAN CONFIG FIREBASE KAMU
    const firebaseConfig = {
      apiKey: "AIzaSyACABaBtdAgT6momcF9Q7fYyLf9-1L8DgA",
      authDomain: "kaloritrack-33f43.firebaseapp.com",
      projectId: "kaloritrack-33f43",
      storageBucket: "kaloritrack-33f43.firebasestorage.app",
      messagingSenderId: "680640087028",
      appId: "1:680640087028:web:f370bb73763522a6ca6fa1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const dayNames = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

    async function loadData() {
      try {
        await signInAnonymously(auth);
        const userId = auth.currentUser.uid;

        const days = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          days.push(d.toISOString().split('T')[0]);
        }

        const q = query(
          collection(db, 'foodLogs'),
          where('userId', '==', userId)
        );

        const snapshot = await getDocs(q);
        const logs = snapshot.docs.map(doc => doc.data());

        const weekData = days.map(date => {
          const total = logs
            .filter(item => item.date === date)
            .reduce((sum, item) => sum + (item.calories || 0), 0);
          return { date, kalori: Math.round(total) };
        });

        const total = weekData.reduce((s, d) => s + d.kalori, 0);
        const aktif = weekData.filter(d => d.kalori > 0).length;
        const maxKal = Math.max(...weekData.map(d => d.kalori), 1);

        document.getElementById('rataRata').textContent =
          Math.round(total / 7).toLocaleString();
        document.getElementById('hariAktif').textContent = aktif;
        document.getElementById('totalMinggu').textContent =
          total.toLocaleString();

        const barChart = document.getElementById('barChart');
        weekData.forEach(item => {
          const pct = Math.round((item.kalori / maxKal) * 100);
          const color = item.kalori > 1800 ? '#CDDC39' : '#4CAF50';
          barChart.innerHTML += `
            <div class="bar-col">
              <div class="bar-num">${item.kalori > 0 ? item.kalori : ''}</div>
              <div style="width:100%;flex:1;display:flex;flex-direction:column;justify-content:flex-end">
                <div class="bar" style="height:${pct}%;background:${color}"></div>
              </div>
              <div class="bar-day">${dayNames[new Date(item.date).getDay()]}</div>
            </div>`;
        });

        const tbody = document.getElementById('tableBody');
        weekData.forEach(item => {
          tbody.innerHTML += `
            <tr>
              <td>${dayNames[new Date(item.date).getDay()]}</td>
              <td>${item.date}</td>
              <td>${item.kalori > 0 ? item.kalori + ' kkal' : '-'}</td>
            </tr>`;
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Gagal memuat data: ' + err.message;
      }
    }

    loadData();
  </script>
</body>
</html>
